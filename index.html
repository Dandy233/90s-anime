<!DOCTYPE html>
<html lang="zh-CN" data-theme="retro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90后经典动漫收藏大全</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Press+Start+2P&family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ===== 基础变量定义 ===== */
        :root {
            /* 主题1: 复古街机 - 默认 */
            --retro-primary: #ff006e;
            --retro-secondary: #3a86ff;
            --retro-accent: #ffbe0b;
            --retro-bg: #0d0221;
            --retro-card: #1a1a2e;
            --retro-text: #fff;
            --retro-muted: #a0a0a0;
            --retro-border: #ff006e;
            --retro-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
            --retro-font: 'Noto Sans SC', sans-serif;
            --retro-display: 'Press Start 2P', cursive;

            /* 主题2: 新拟态 - 柔和 */
            --neumorphic-bg: #e0e5ec;
            --neumorphic-card: #e0e5ec;
            --neumorphic-text: #2d3748;
            --neumorphic-muted: #718096;
            --neumorphic-primary: #667eea;
            --neumorphic-shadow-light: #ffffff;
            --neumorphic-shadow-dark: #a3b1c6;
            --neumorphic-font: 'Inter', sans-serif;

            /* 主题3: 玻璃拟态 */
            --glass-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-card: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-text: #fff;
            --glass-muted: rgba(255, 255, 255, 0.7);
            --glass-blur: blur(20px);
            --glass-font: 'Inter', sans-serif;

            /* 主题4: 赛博朋克 */
            --cyber-bg: #0a0a0f;
            --cyber-card: #12121a;
            --cyber-primary: #00f5ff;
            --cyber-secondary: #ff00ff;
            --cyber-accent: #ffff00;
            --cyber-text: #e0e0e0;
            --cyber-muted: #666;
            --cyber-grid: linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            --cyber-font: 'Noto Sans SC', sans-serif;

            /* 主题5: 极简日系 */
            --minimal-bg: #fafafa;
            --minimal-card: #fff;
            --minimal-text: #1a1a1a;
            --primary: #ff6b6b;
            --minimal-muted: #999;
            --minimal-border: #e5e5e5;
            --minimal-accent: #ffe4e1;
            --minimal-font: 'Noto Sans SC', sans-serif;
            --minimal-display: 'Playfair Display', serif;

            /* 主题6: Material You */
            --material-bg: #f5f5f5;
            --material-card: #fff;
            --material-primary: #6750a4;
            --material-secondary: #e8def8;
            --material-text: #1c1b1f;
            --material-muted: #49454f;
            --material-surface: #fffbfe;
            --material-font: 'Noto Sans SC', sans-serif;
        }

        /* ===== 主题切换器 ===== */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg, #fff);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 140px;
        }

        .theme-switcher-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted, #666);
            text-align: center;
            margin-bottom: 4px;
        }

        .theme-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text, #333);
        }

        .theme-btn:hover {
            transform: translateX(-3px);
        }

        .theme-btn.active {
            background: var(--primary, #667eea);
            color: white;
        }

        .theme-btn .theme-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .theme-dot.retro { background: linear-gradient(135deg, #ff006e, #3a86ff); }
        .theme-dot.neumorphic { background: #e0e5ec; box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #fff; }
        .theme-dot.glass { background: linear-gradient(135deg, #667eea, #764ba2); }
        .theme-dot.cyber { background: linear-gradient(135deg, #00f5ff, #ff00ff); }
        .theme-dot.minimal { background: #fafafa; border: 2px solid #ff6b6b; }
        .theme-dot.material { background: #6750a4; }

        /* ===== 主题1: 复古街机 ===== */
        [data-theme="retro"] {
            --bg: var(--retro-bg);
            --card: var(--retro-card);
            --text: var(--retro-text);
            --muted: var(--retro-muted);
            --primary: var(--retro-primary);
            --secondary: var(--retro-secondary);
            --accent: var(--retro-accent);
            --border: var(--retro-border);
            --shadow: var(--retro-shadow);
            --font: var(--retro-font);
            --display: var(--retro-display);
        }

        [data-theme="retro"] body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,0,110,0.03) 2px, rgba(255,0,110,0.03) 4px);
        }

        [data-theme="retro"] .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.5), inset 0 0 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        [data-theme="retro"] .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
            pointer-events: none;
        }

        [data-theme="retro"] .header h1 {
            font-family: var(--display);
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 var(--secondary);
        }

        [data-theme="retro"] .stat-card {
            background: var(--card);
            border: 2px solid var(--primary);
            box-shadow: 4px 4px 0 var(--secondary);
            position: relative;
        }

        [data-theme="retro"] .stat-card::before {
            content: '◆';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 14px;
        }

        [data-theme="retro"] .stat-number {
            font-family: var(--display);
            color: var(--accent);
            text-shadow: 2px 2px 0 var(--primary);
        }

        [data-theme="retro"] .anime-section {
            background: var(--card);
            border: 2px solid var(--border);
            box-shadow: 6px 6px 0 var(--secondary);
        }

        [data-theme="retro"] .section-title {
            font-family: var(--display);
            font-size: 14px;
            color: var(--accent);
            text-shadow: 2px 2px 0 var(--primary);
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        [data-theme="retro"] .anime-item {
            border-left: 3px solid var(--primary);
            background: linear-gradient(90deg, rgba(255,0,110,0.1), transparent);
        }

        [data-theme="retro"] .anime-item:hover {
            background: linear-gradient(90deg, rgba(255,0,110,0.2), transparent);
            transform: translateX(5px);
        }

        [data-theme="retro"] .tag {
            background: var(--primary);
            border: 2px solid var(--accent);
            box-shadow: 2px 2px 0 var(--secondary);
        }

        [data-theme="retro"] .checkbox-wrapper input:checked + .checkbox-custom {
            background: var(--accent);
            border-color: var(--accent);
        }

        [data-theme="retro"] .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 10px var(--primary);
        }

        [data-theme="retro"] .achievement-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        /* ===== 主题2: 新拟态 ===== */
        [data-theme="neumorphic"] {
            --bg: var(--neumorphic-bg);
            --card: var(--neumorphic-card);
            --text: var(--neumorphic-text);
            --muted: var(--neumorphic-muted);
            --primary: var(--neumorphic-primary);
            --shadow-light: var(--neumorphic-shadow-light);
            --shadow-dark: var(--neumorphic-shadow-dark);
            --font: var(--neumorphic-font);
        }

        [data-theme="neumorphic"] body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
        }

        [data-theme="neumorphic"] .header {
            background: var(--card);
            border-radius: 30px;
            box-shadow: 
                20px 20px 60px var(--shadow-dark),
                -20px -20px 60px var(--shadow-light);
        }

        [data-theme="neumorphic"] .stat-card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            border: none;
        }

        [data-theme="neumorphic"] .stat-card:hover {
            box-shadow: 
                inset 8px 8px 16px var(--shadow-dark),
                inset -8px -8px 16px var(--shadow-light);
        }

        [data-theme="neumorphic"] .stat-number {
            background: linear-gradient(135deg, var(--primary), #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        [data-theme="neumorphic"] .anime-section {
            background: var(--card);
            border-radius: 30px;
            box-shadow: 
                15px 15px 30px var(--shadow-dark),
                -15px -15px 30px var(--shadow-light);
            border: none;
        }

        [data-theme="neumorphic"] .section-title {
            background: var(--card);
            border-radius: 15px;
            box-shadow: 
                5px 5px 10px var(--shadow-dark),
                -5px -5px 10px var(--shadow-light);
        }

        [data-theme="neumorphic"] .anime-item {
            background: var(--card);
            border-radius: 15px;
            box-shadow: 
                5px 5px 10px var(--shadow-dark),
                -5px -5px 10px var(--shadow-light);
            border: none;
            margin-bottom: 12px;
        }

        [data-theme="neumorphic"] .anime-item:hover {
            box-shadow: 
                inset 5px 5px 10px var(--shadow-dark),
                inset -5px -5px 10px var(--shadow-light);
        }

        [data-theme="neumorphic"] .tag {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
            color: var(--primary);
            font-weight: 600;
        }

        [data-theme="neumorphic"] .checkbox-custom {
            background: var(--card);
            box-shadow: 
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
            border: none;
        }

        [data-theme="neumorphic"] .progress-section,
        [data-theme="neumorphic"] .achievement {
            background: var(--card);
            border-radius: 25px;
            box-shadow: 
                10px 10px 20px var(--shadow-dark),
                -10px -10px 20px var(--shadow-light);
        }

        [data-theme="neumorphic"] .progress-bar {
            background: var(--card);
            box-shadow: 
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
        }

        [data-theme="neumorphic"] .progress-fill {
            background: linear-gradient(135deg, var(--primary), #764ba2);
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
        }

        [data-theme="neumorphic"] .achievement-badge {
            background: linear-gradient(135deg, var(--primary), #764ba2);
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
        }

        [data-theme="neumorphic"] .filter-btn {
            background: var(--card);
            box-shadow: 
                5px 5px 10px var(--shadow-dark),
                -5px -5px 10px var(--shadow-light);
        }

        [data-theme="neumorphic"] .filter-btn.active,
        [data-theme="neumorphic"] .filter-btn:hover {
            box-shadow: 
                inset 5px 5px 10px var(--shadow-dark),
                inset -5px -5px 10px var(--shadow-light);
        }

        /* ===== 主题3: 玻璃拟态 ===== */
        [data-theme="glass"] {
            --bg: transparent;
            --card: var(--glass-card);
            --text: var(--glass-text);
            --muted: var(--glass-muted);
            --primary: #fff;
            --border: var(--glass-border);
            --blur: var(--glass-blur);
            --font: var(--glass-font);
        }

        [data-theme="glass"] body {
            background: var(--glass-bg);
            font-family: var(--font);
            color: var(--text);
            background-attachment: fixed;
        }

        [data-theme="glass"] .header {
            background: var(--card);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        [data-theme="glass"] .stat-card {
            background: var(--card);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        [data-theme="glass"] .stat-number {
            color: #fff;
            text-shadow: 0 2px 10px rgba(255,255,255,0.3);
        }

        [data-theme="glass"] .anime-section {
            background: var(--card);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        [data-theme="glass"] .section-title {
            background: rgba(255,255,255,0.1);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        [data-theme="glass"] .anime-item {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        [data-theme="glass"] .anime-item:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        [data-theme="glass"] .tag {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        [data-theme="glass"] .progress-section,
        [data-theme="glass"] .achievement {
            background: var(--card);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        [data-theme="glass"] .progress-bar {
            background: rgba(255,255,255,0.2);
        }

        [data-theme="glass"] .progress-fill {
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.7));
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        [data-theme="glass"] .achievement-badge {
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border: 2px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        [data-theme="glass"] .checkbox-custom {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
        }

        [data-theme="glass"] .filter-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        /* ===== 主题4: 赛博朋克 ===== */
        [data-theme="cyber"] {
            --bg: var(--cyber-bg);
            --card: var(--cyber-card);
            --text: var(--cyber-text);
            --muted: var(--cyber-muted);
            --primary: var(--cyber-primary);
            --secondary: var(--cyber-secondary);
            --accent: var(--cyber-accent);
            --font: var(--cyber-font);
        }

        [data-theme="cyber"] body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            background-image: 
                var(--cyber-grid),
                linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px, 50px 50px;
        }

        [data-theme="cyber"] .header {
            background: var(--card);
            border: 1px solid var(--primary);
            box-shadow: 
                0 0 20px rgba(0, 245, 255, 0.3),
                inset 0 0 20px rgba(0, 245, 255, 0.05);
            position: relative;
        }

        [data-theme="cyber"] .header::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            animation: cyber-scan 3s linear infinite;
        }

        @keyframes cyber-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        [data-theme="cyber"] .header h1 {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 40px var(--primary);
        }

        [data-theme="cyber"] .stat-card {
            background: var(--card);
            border: 1px solid rgba(0, 245, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        [data-theme="cyber"] .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        [data-theme="cyber"] .stat-number {
            color: var(--primary);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px var(--primary);
        }

        [data-theme="cyber"] .anime-section {
            background: var(--card);
            border: 1px solid rgba(255, 0, 255, 0.3);
            box-shadow: 
                0 0 30px rgba(255, 0, 255, 0.1),
                inset 0 0 30px rgba(0,0,0,0.5);
        }

        [data-theme="cyber"] .section-title {
            background: linear-gradient(90deg, rgba(0,245,255,0.2), transparent);
            border-left: 3px solid var(--primary);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        [data-theme="cyber"] .anime-item {
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid rgba(0, 245, 255, 0.2);
            position: relative;
        }

        [data-theme="cyber"] .anime-item:hover {
            border-color: var(--primary);
            box-shadow: 
                0 0 20px rgba(0, 245, 255, 0.3),
                inset 0 0 20px rgba(0, 245, 255, 0.05);
        }

        [data-theme="cyber"] .tag {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
        }

        [data-theme="cyber"] .tag.watched {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
        }

        [data-theme="cyber"] .tag.favorite {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.3);
        }

        [data-theme="cyber"] .progress-section,
        [data-theme="cyber"] .achievement {
            background: var(--card);
            border: 1px solid rgba(0, 245, 255, 0.2);
        }

        [data-theme="cyber"] .progress-bar {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
        }

        [data-theme="cyber"] .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 20px var(--primary);
        }

        [data-theme="cyber"] .achievement-badge {
            background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(255,0,255,0.2));
            border: 2px solid var(--primary);
            box-shadow: 
                0 0 30px rgba(0, 245, 255, 0.4),
                inset 0 0 20px rgba(0, 245, 255, 0.1);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        [data-theme="cyber"] .checkbox-custom {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 245, 255, 0.5);
        }

        [data-theme="cyber"] .checkbox-wrapper input:checked + .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        [data-theme="cyber"] .filter-btn {
            background: transparent;
            border: 1px solid rgba(0, 245, 255, 0.3);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        [data-theme="cyber"] .filter-btn.active,
        [data-theme="cyber"] .filter-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        /* ===== 主题5: 极简日系 ===== */
        [data-theme="minimal"] {
            --bg: var(--minimal-bg);
            --card: var(--minimal-card);
            --text: var(--minimal-text);
            --primary: var(--primary);
            --muted: var(--minimal-muted);
            --border: var(--minimal-border);
            --accent: var(--minimal-accent);
            --font: var(--minimal-font);
            --display: var(--minimal-display);
        }

        [data-theme="minimal"] body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
        }

        [data-theme="minimal"] .header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        [data-theme="minimal"] .header h1 {
            font-family: var(--display);
            font-size: 24px;
            font-weight: 700;

            const container = document.getElementById('animeContainer');

            const allAnime = [...animeData.japan, ...animeData.china, ...animeData.us];
            
            const grouped = {
                '日本动画': allAnime.filter(a => a.category === 'jp'),
                '国产动画': allAnime.filter(a => a.category === 'cn'),
                '欧美动画': allAnime.filter(a => a.category === 'us')
            };

            for (const [category, items] of Object.entries(grouped)) {

                const section = document.createElement('div');
                section.className = 'anime-section';

                        <span class="section-count">${filteredItems.length}</span>
                    </div>
                    <div class="anime-list">
                        ${filteredItems.map(anime => createAnimeItem(anime)).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        // ===== 筛选项目 =====
        function filterItems(items) {
            if (currentFilter === 'all') return items;
            if (currentFilter === 'watched') {
                return items.filter(a => savedData[a.title]?.watched);
            }
            if (currentFilter === 'favorite') {
                return items.filter(a => savedData[a.title]?.favorite);
            }
            if (currentFilter === 'unwatched') {
                return items.filter(a => !savedData[a.title]?.watched);
            }
            return items.filter(a => a.category === currentFilter);
        }

        // ===== 创建动画项 =====
        function createAnimeItem(anime) {
            const data = savedData[anime.title] || {};
            const stars = '⭐'.repeat(anime.rating);
            
            return `
                <div class="anime-item" data-title="${anime.title}">
                    <div class="anime-header">
                        <div class="anime-title-section">
                            <a href="https://zh.wikipedia.org/wiki/${encodeURIComponent(anime.title)}" 
                               target="_blank" class="anime-title">${anime.title}</a>
                            <div class="anime-meta">
                                <span class="anime-year">${anime.year}</span>
                                <span class="rating">${stars}</span>
                            </div>
                        </div>
                        <div class="anime-actions">
                            <label class="checkbox-wrapper" title="标记为已看过">
                                <input type="checkbox" 
                                       ${data.watched ? 'checked' : ''} 
                                       onchange="toggleWatched('${anime.title}')">
                                <span class="checkbox-custom"></span>
                                <span class="checkbox-label">看过</span>
                            </label>
                            <label class="checkbox-wrapper" title="收藏">
                                <input type="checkbox" 
                                       ${data.favorite ? 'checked' : ''} 
                                       onchange="toggleFavorite('${anime.title}')">
                                <span class="checkbox-custom"></span>
                                <span class="checkbox-label">收藏</span>
                            </label>
                        </div>
                    </div>
                    <div class="anime-desc">${anime.desc}</div>
                    <div class="anime-tags">
                        ${data.watched ? '<span class="tag watched">✓ 已看</span>' : ''}
                        ${data.favorite ? '<span class="tag favorite">♥ 收藏</span>' : ''}
                    </div>
                </div>
            `;
        }

        // ===== 切换看过状态 =====
        function toggleWatched(title) {
            if (!savedData[title]) savedData[title] = {};
            savedData[title].watched = !savedData[title].watched;
            localStorage.setItem('animeTracker', JSON.stringify(savedData));
            renderAnimeList();
            updateStats();
        }

        // ===== 切换收藏状态 =====
        function toggleFavorite(title) {
            if (!savedData[title]) savedData[title] = {};
            savedData[title].favorite = !savedData[title].favorite;
            localStorage.setItem('animeTracker', JSON.stringify(savedData));
            renderAnimeList();
            updateStats();
        }

        // ===== 更新统计 =====
        function updateStats() {
            const allAnime = [...animeData.japan, ...animeData.china, ...animeData.us];
            const total = allAnime.length;
            let watched = 0, favorite = 0;

            for (const anime of allAnime) {
                if (savedData[anime.title]?.watched) watched++;
                if (savedData[anime.title]?.favorite) favorite++;
            }

            document.getElementById('totalCount').textContent = total;
            document.getElementById('watchedCount').textContent = watched;
            document.getElementById('favoriteCount').textContent = favorite;

            const percent = total > 0 ? Math.round((watched / total) * 100) : 0;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = 
                `已观看 ${watched} / ${total} (${percent}%)`;

            // 成就系统
            const achievementSection = document.getElementById('achievementSection');
            const achievementBadge = document.getElementById('achievementBadge');
            
            let badge = '动画新手';
            if (watched >= 5) badge = '动画爱好者';
            if (watched >= 10) badge = '资深宅';
            if (watched >= 15) badge = '动画大师';
            if (watched >= total) badge = '补完狂魔';
            
            achievementBadge.textContent = badge;
            achievementSection.style.display = watched > 0 ? 'block' : 'none';
        }

        // ===== 筛选类别 =====
        function filterCategory(category) {
            currentFilter = category;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderAnimeList();
        }

        // ===== 主题切换 =====
        function switchTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('preferredTheme', theme);
            
            // 更新按钮状态
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.theme === theme) {
                    btn.classList.add('active');
                }
            });
        }

        // ===== 加载保存的主题 =====
        function loadTheme() {
            const savedTheme = localStorage.getItem('preferredTheme') || 'retro';
            switchTheme(savedTheme);
        }

        // ===== 启动 =====
        init();
    </script>
</body>
</html>
